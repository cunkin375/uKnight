<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/videocall.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <div class="video-container">
        <video id="localVideo" autoplay playsinline muted></video>
        <video id="remoteVideo" autoplay playsinline></video>

        <div class="controls">
            <button id="cameraBtn" class="control-btn"><i class="fa fa-video-camera"></i></button>
            <button id="micBtn" class="control-btn"><i class="fa fa-microphone"></i></button>
            <button id="hangupBtn" class="control-btn hangup"><i class="fa fa-phone"></i></button>
        </div>

        <div id="meetingInfo">
            <p>Meeting ID: <span id="meetingIdDisplay">Loading...</span></p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script src="/js/videocall.js"></script>
</body>

</html>
